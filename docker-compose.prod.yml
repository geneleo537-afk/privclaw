# PrivClaw —— 生产环境覆盖配置
# 与基础配置合并使用: make prod  或  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# 此文件只覆盖与开发环境不同的部分，保持最小化原则

services:
  # ─── 后端 FastAPI (生产模式) ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: production
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
    volumes: []
    restart: always

  # ─── Celery Worker (生产模式) ─────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      target: production
    env_file:
      - .env.prod
    volumes: []
    restart: always

  # ─── 前端 Next.js (生产模式) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://your-domain.com/api/v1}
    command: node server.js
    environment:
      NODE_ENV: production
    volumes: []
    restart: always

  # ─── Nginx 反向代理 (仅生产环境存在) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: privclaw-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - privclaw-network
    restart: always
