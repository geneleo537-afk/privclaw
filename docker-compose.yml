# PrivClaw —— 开发环境 Docker Compose 配置
# 启动命令: make dev  或  docker compose up -d

name: privclaw

networks:
  privclaw-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  # ─── 数据库 ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: privclaw-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-privclaw}
      POSTGRES_USER: ${POSTGRES_USER:-privclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-privclaw123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-privclaw} -d ${POSTGRES_DB:-privclaw}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - privclaw-network
    restart: unless-stopped

  # ─── 缓存 / Celery Broker ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: privclaw-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - privclaw-network
    restart: unless-stopped

  # ─── 对象存储 ─────────────────────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: privclaw-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - privclaw-network
    restart: unless-stopped

  # ─── 后端 FastAPI ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: development
    container_name: privclaw-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - privclaw-network
    restart: unless-stopped

  # ─── Celery 异步任务 Worker ───────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      target: development
    container_name: privclaw-celery-worker
    command: celery -A app.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - privclaw-network
    restart: unless-stopped

  # ─── 前端 Next.js ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: privclaw-frontend
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - privclaw-network
    restart: unless-stopped
