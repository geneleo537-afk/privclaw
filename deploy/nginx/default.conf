# 龙虾超市 —— Nginx 反向代理配置（含安全加固 + HTTPS）

# ── 频率限制区域定义 ─────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=frontend:10m rate=50r/s;

# 后端 FastAPI 上游
upstream backend {
    server backend:8000;
}

# 前端 Next.js 上游
upstream frontend {
    server frontend:3000;
}

# ── HTTP → HTTPS 重定向 ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS 主服务 ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # ── SSL 配置 ──────────────────────────────────────────────────────────────
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── 基础安全 ──────────────────────────────────────────────────────────────
    server_tokens off;
    client_max_body_size 2m;

    # ── 安全响应头 ────────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── 封锁扫描器/爬虫 ──────────────────────────────────────────────────────
    if ($http_user_agent ~* (masscan|nmap|nikto|sqlmap|zgrab|python-requests/2\.2[0-9])) {
        return 444;
    }

    # ── API 文档（仅内网/本机访问）────────────────────────────────────────────
    location ~ ^/(docs|openapi\.json|redoc) {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 登录/注册接口（严格限速）─────────────────────────────────────────────
    location ~ ^/api/v1/(auth/login|auth/register|auth/refresh) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
    }

    # ── 文件上传接口（放宽请求体）────────────────────────────────────────────
    location ~ ^/api/v1/(plugins/.*/upload|users/me/avatar) {
        limit_req zone=api burst=5 nodelay;
        limit_req_status 429;

        client_max_body_size 100m;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # ── 插件下载接口（返回文件流，放宽限制）────────────────────────────────
    location ~ ^/api/v1/plugins/.*/download$ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # ── 其他 API 接口 ────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }

    # ── 前端页面（兜底规则）──────────────────────────────────────────────────
    location / {
        limit_req zone=frontend burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
