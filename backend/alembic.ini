[alembic]
# 脚本目录，相对于此配置文件的路径
script_location = alembic

# 将当前目录（/app）加入 sys.path，使 alembic/env.py 能 import app.*
prepend_sys_path = .

# 迁移脚本命名模板
file_template = %%(rev)s_%%(slug)s

# 时区设置
timezone = Asia/Shanghai

# 截断长描述（用于文件名）
truncate_slug_length = 40

# 版本路径分隔符（在多版本目录场景下有意义）
version_path_separator = os

# sqlalchemy.url 在 alembic/env.py 中从 app.core.config.settings 覆盖
# 此处保留占位符，env.py 会在运行时动态设置
sqlalchemy.url = postgresql://placeholder/placeholder

[post_write_hooks]
# 无额外的后置钩子

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
